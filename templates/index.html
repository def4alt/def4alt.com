{{define "index.html"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="https://unpkg.com/htmx.org@2.0.7"></script>
  </head>
  <body>
    <main>
      <h1>Blog</h1>

      <ul>
        {{range .Posts}}
          <li>
            <a
              href="/posts/{{.ID}}"
              hx-get="/posts/{{.ID}}"
              hx-target="#post"
              hx-swap="innerHTML"
            >
              {{.Title}}
            </a>
          </li>
        {{end}}
      </ul>

      <section id="post">
        <p>Select a post.</p>
      </section>
    </main>
  </body>
</html>
{{end}}
