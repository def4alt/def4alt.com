{{define "base"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    <title>{{if .Title}}{{.Title}} · Blog{{else}}Def4alt's Blog{{end}}</title>
    {{if .Description}}
      <meta name="description" content="{{.Description}}">
    {{end}}
    <link rel="alternate" type="application/rss+xml" title="Def4alt's Blog RSS" href="/rss.xml">
    <script src="/static/htmx.min.js" defer></script>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body class="site" hx-boost="true">
    <main class="site-main">
      {{template "content" .}}
    </main>
  </body>
</html>
{{end}}
